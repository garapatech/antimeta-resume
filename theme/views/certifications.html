{% if resume.certificates %}
    <section id="certifications">
        <h2>Certificações</h2>
        <ul class="item">
            {% for certificate in resume.certificates %}
                <li>
                    {% if certificate.name %}
                        <strong>{{ certificate.name }}</strong>{% if certificate.issuer %}: {{ certificate.issuer }}{% endif %}
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    </section>
{% endif %}
