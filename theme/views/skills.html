{% if resume.skills %}
    <section id="skills">
        <h2>Habilidades</h2>
        <ul class="item">
            {% for skill in resume.skills %}
                <li>
                    {% if skill.name %}
                        {% if skill.keywords %}
                            <strong>{{ skill.name }}</strong>: {{ skill.keywords | map('safe') | join(', ') }}
                        {% else %}
                            <strong>{{ skill.name }}</strong>
                        {% endif %}
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    </section>
{% endif %}
